services:

  postgres:
    image: postgres:18-alpine
    container_name: fridge-app-postgres
    env_file:
      - path: .env-dev
        required: false
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-fridge_dev}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - postgres

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: app
    container_name: fridge-app-api
    env_file:
      - path: .env-dev
        required: false
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - dev
    command: [ "api", "--dev", "--host", "0.0.0.0", "--port", "8000" ]

  devcontainer:
    image: fridge-app-devcontainer
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    volumes:
      - .:/workspaces/fridge-app
      - command-history-volume:/home/user/.history/

  app:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: app
    ports:
      - "8000:8000"
    profiles:
      - app

volumes:
  command-history-volume:
  postgres_data:
