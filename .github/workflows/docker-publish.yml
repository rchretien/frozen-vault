name: Build and push Docker image

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  migration-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: fridge_test
          POSTGRES_PASSWORD: fridge_test
          POSTGRES_DB: fridge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fridge_test -d fridge_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      ENVIRONMENT: test
      DB_TYPE: postgres
      DB_USER: fridge_test
      DB_PASSWORD: fridge_test
      DB_NAME: fridge_test
      DB_HOST: localhost
      DB_PORT: "5432"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Run migrations
        run: uv run --directory apps/api poe migrate

      - name: Verify migrated schema
        run: |
          uv run --directory apps/api python - <<'PY'
          from sqlalchemy import create_engine, inspect, text

          from fridge_app_backend.config import config

          engine = create_engine(config.db_url)
          with engine.connect() as connection:
              inspector = inspect(connection)
              tables = set(inspector.get_table_names())
              required_tables = {
                  "alembic_version",
                  "product",
                  "product_type",
                  "product_location",
              }
              missing_tables = required_tables - tables
              if missing_tables:
                  raise SystemExit(f"Missing tables after migration: {sorted(missing_tables)}")

              product_type_count = connection.scalar(text("select count(*) from product_type"))
              product_location_count = connection.scalar(
                  text("select count(*) from product_location")
              )
              if not product_type_count or not product_location_count:
                  raise SystemExit("Missing seed rows after migration")
          PY

  build-and-push:
    runs-on: ubuntu-latest
    needs: migration-test

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # tag based on semver tag (v1.2.3 -> 1.2.3, 1.2, 1)
            type=semver,pattern={{version}},value=${{ github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.ref_name }}
            type=semver,pattern={{major}},value=${{ github.ref_name }}
            
            # latest tag for the most recent release
            type=raw,value=latest
            
            # always tag by commit sha
            type=sha
      

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          target: app

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
