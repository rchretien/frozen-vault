services:
  nginx:
    image: nginx:alpine
    container_name: fridge-app-nginx
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs/raspberrypi.local.pem:/etc/nginx/certs/cert.pem:ro
      - ./certs/raspberrypi.local-key.pem:/etc/nginx/certs/key.pem:ro
    restart: unless-stopped

  api:
    image: ghcr.io/rchretien/fridge-app:latest
    container_name: fridge-app-api
    env_file:
      - .env-prod
    environment:
      API_ROOT_PATH: /backend
    command: [ "api-prod", "--host", "0.0.0.0", "--port", "8000" ]
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "/workspace/app/apps/api/.venv/bin/python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/index', timeout=5).read()" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env-prod
